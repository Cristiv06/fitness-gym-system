<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>500 - Eroare server</title>
    <style>
        body { font-family: Arial, sans-serif; background: #eef3fb; color: #1f2937; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .error-box { background: #fff; border: 1px solid #d9e0ea; border-radius: 12px; padding: 40px 48px; text-align: center; max-width: 480px; box-shadow: 0 10px 28px rgba(15,23,42,0.08); }
        .error-code { font-size: 72px; font-weight: 700; color: #b42318; margin: 0; line-height: 1; }
        .error-title { font-size: 22px; color: #374151; margin: 12px 0 8px; }
        .error-msg { color: #64748b; font-size: 15px; margin: 0 0 28px; }
        a { display: inline-block; background: #0f62fe; color: #fff; padding: 10px 24px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 14px; }
        a:hover { filter: brightness(0.92); }
    </style>
</head>
<body>
    <div class="error-box">
        <p class="error-code">500</p>
        <h1 class="error-title">Eroare interna de server</h1>
        <p class="error-msg">A aparut o eroare neasteptata. Te rugam sa incerci din nou sau sa contactezi administratorul.</p>
        <a href="/">Inapoi la pagina principala</a>
    </div>
</body>
</html>
