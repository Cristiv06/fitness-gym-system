<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Antrenori</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="list-page">
<a th:href="@{/}" class="back-link">&#8592; Acasa</a>
<h1>Antrenori</h1>
<div class="controls">
  <form method="get" th:action="@{/trainers}" class="page-size-form">
    <input type="hidden" name="sort" th:value="${sort}"/>
    <input type="hidden" name="dir" th:value="${dir}"/>
    <label>Linii per pagina:
      <select name="size" onchange="this.form.submit()">
        <option value="5"  th:selected="${size == 5}">5</option>
        <option value="10" th:selected="${size == 10}">10</option>
        <option value="20" th:selected="${size == 20}">20</option>
        <option value="50" th:selected="${size == 50}">50</option>
      </select>
    </label>
  </form>
</div>
<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>
        <a th:href="@{/trainers(page=0,size=${size},sort='fullName',dir=${sort == 'fullName' && dir == 'asc' ? 'desc' : 'asc'})}">
          Nume complet
          <span th:if="${sort == 'fullName'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span>
        </a>
      </th>
      <th>
        <a th:href="@{/trainers(page=0,size=${size},sort='specialization',dir=${sort == 'specialization' && dir == 'asc' ? 'desc' : 'asc'})}">
          Specializare
          <span th:if="${sort == 'specialization'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span>
        </a>
      </th>
      <th>Telefon</th>
      <th>Email</th>
    </tr>
  </thead>
  <tbody>
    <tr th:each="t : ${trainersPage.content}">
      <td th:text="${t.trainerId}"></td>
      <td th:text="${t.fullName}"></td>
      <td th:text="${t.specialization}"></td>
      <td th:text="${t.phone}"></td>
      <td th:text="${t.email}"></td>
    </tr>
    <tr th:if="${trainersPage.empty}">
      <td colspan="5">Nu exista antrenori.</td>
    </tr>
  </tbody>
</table>
<div class="pagination">
  <a th:href="@{/trainers(page=0,size=${size},sort=${sort},dir=${dir})}" th:classappend="${trainersPage.first ? 'disabled' : ''}">&#171;</a>
  <a th:href="@{/trainers(page=${trainersPage.number - 1},size=${size},sort=${sort},dir=${dir})}" th:classappend="${trainersPage.first ? 'disabled' : ''}">&#8249;</a>
  <span th:each="i : ${#numbers.sequence(0, trainersPage.totalPages - 1)}"
        th:if="${trainersPage.totalPages <= 7 || (i >= trainersPage.number - 2 && i <= trainersPage.number + 2)}">
    <a th:href="@{/trainers(page=${i},size=${size},sort=${sort},dir=${dir})}"
       th:text="${i + 1}"
       th:classappend="${i == trainersPage.number ? 'active' : ''}"></a>
  </span>
  <a th:href="@{/trainers(page=${trainersPage.number + 1},size=${size},sort=${sort},dir=${dir})}" th:classappend="${trainersPage.last ? 'disabled' : ''}">&#8250;</a>
  <a th:href="@{/trainers(page=${trainersPage.totalPages - 1},size=${size},sort=${sort},dir=${dir})}" th:classappend="${trainersPage.last ? 'disabled' : ''}">&#187;</a>
</div>
<p class="pag-info">Pagina <span th:text="${trainersPage.number + 1}"></span> din <span th:text="${trainersPage.totalPages}"></span> &middot; Total: <span th:text="${trainersPage.totalElements}"></span></p>
</body>
</html>
