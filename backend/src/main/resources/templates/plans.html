<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Planuri abonament</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="list-page">
<a th:href="@{/}" class="back-link">&#8592; Acasa</a>
<h1>Planuri abonament</h1>
<div class="controls">
  <form method="get" th:action="@{/plans}" class="page-size-form">
    <input type="hidden" name="sort" th:value="${sort}"/>
    <input type="hidden" name="dir" th:value="${dir}"/>
    <label>Linii per pagina:
      <select name="size" onchange="this.form.submit()">
        <option value="5"  th:selected="${size == 5}">5</option>
        <option value="10" th:selected="${size == 10}">10</option>
        <option value="20" th:selected="${size == 20}">20</option>
        <option value="50" th:selected="${size == 50}">50</option>
      </select>
    </label>
  </form>
</div>
<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>
        <a th:href="@{/plans(page=0,size=${size},sort='name',dir=${sort == 'name' && dir == 'asc' ? 'desc' : 'asc'})}">
          Nume
          <span th:if="${sort == 'name'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span>
        </a>
      </th>
      <th>
        <a th:href="@{/plans(page=0,size=${size},sort='durationMonths',dir=${sort == 'durationMonths' && dir == 'asc' ? 'desc' : 'asc'})}">
          Durata (luni)
          <span th:if="${sort == 'durationMonths'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span>
        </a>
      </th>
      <th>
        <a th:href="@{/plans(page=0,size=${size},sort='price',dir=${sort == 'price' && dir == 'asc' ? 'desc' : 'asc'})}">
          Pret
          <span th:if="${sort == 'price'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span>
        </a>
      </th>
      <th>Descriere</th>
      <th>Creat la</th>
    </tr>
  </thead>
  <tbody>
    <tr th:each="p : ${plansPage.content}">
      <td th:text="${p.planId}"></td>
      <td th:text="${p.name}"></td>
      <td th:text="${p.durationMonths}"></td>
      <td th:text="${p.price}"></td>
      <td th:text="${p.description}"></td>
      <td th:text="${#temporals.format(p.createdAt, 'dd.MM.yyyy HH:mm')}"></td>
    </tr>
    <tr th:if="${plansPage.empty}">
      <td colspan="6">Nu exista planuri.</td>
    </tr>
  </tbody>
</table>
<div class="pagination">
  <a th:href="@{/plans(page=0,size=${size},sort=${sort},dir=${dir})}" th:classappend="${plansPage.first ? 'disabled' : ''}">&#171;</a>
  <a th:href="@{/plans(page=${plansPage.number - 1},size=${size},sort=${sort},dir=${dir})}" th:classappend="${plansPage.first ? 'disabled' : ''}">&#8249;</a>
  <span th:each="i : ${#numbers.sequence(0, plansPage.totalPages - 1)}"
        th:if="${plansPage.totalPages <= 7 || (i >= plansPage.number - 2 && i <= plansPage.number + 2)}">
    <a th:href="@{/plans(page=${i},size=${size},sort=${sort},dir=${dir})}"
       th:text="${i + 1}"
       th:classappend="${i == plansPage.number ? 'active' : ''}"></a>
  </span>
  <a th:href="@{/plans(page=${plansPage.number + 1},size=${size},sort=${sort},dir=${dir})}" th:classappend="${plansPage.last ? 'disabled' : ''}">&#8250;</a>
  <a th:href="@{/plans(page=${plansPage.totalPages - 1},size=${size},sort=${sort},dir=${dir})}" th:classappend="${plansPage.last ? 'disabled' : ''}">&#187;</a>
</div>
<p class="pag-info">Pagina <span th:text="${plansPage.number + 1}"></span> din <span th:text="${plansPage.totalPages}"></span> &middot; Total: <span th:text="${plansPage.totalElements}"></span></p>
</body>
</html>
