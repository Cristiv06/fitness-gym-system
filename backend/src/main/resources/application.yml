spring:
  application:
    name: gym-system
  profiles:
    active: dev

server:
  port: ${SERVER_PORT:8080}

app:
  security:
    remember-me-key: ${REMEMBER_ME_KEY:gym-remember-me-key-change-in-production-min-32-chars}

springdoc:
  swagger-ui:
    persistAuthorization: true
    csrf:
      enabled: true
  api-docs:
    path: /v3/api-docs
