server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          # folder pe disc (editabil live) cu fallback la classpath; prima locatie are prioritate
          search-locations: file:./config-repo,file:./config-server/config-repo,classpath:/config

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
