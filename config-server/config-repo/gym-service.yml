server:
  port: 8082

spring:
  application:
    name: gym-service
  datasource:
    url: jdbc:mysql://localhost:3306/gym_service_db
    username: gym_user
    password: gym_pass
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

user-service:
  url: http://user-service

# Proprietati demo pentru refresh dinamic (editeaza si fa POST /actuator/refresh)
gym:
  info:
    welcome-message: "REFRESH FARA RESTART"
    max-default-capacity: 30
