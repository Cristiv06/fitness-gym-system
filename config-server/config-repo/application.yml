# Configuratie comuna pentru toate microserviciile
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

# Securitate distribuita: JWT semnat HMAC pentru apelurile inter-servicii (/api/internal/**)
internal:
  jwt:
    secret: "fitness-internal-jwt-secret-change-me-min-32-bytes-0123456789"
    issuer: "fitness-internal"
    ttl-seconds: 120

logging:
  level:
    com.fitness: DEBUG
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
