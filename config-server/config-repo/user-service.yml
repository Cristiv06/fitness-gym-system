server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:mysql://localhost:3306/user_service_db
    username: gym_user
    password: gym_pass
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

security:
  remember-me-key: gym-remember-me-key-change-in-production-min-32-chars

# Resilience4j - Circuit Breaker + Retry pentru apeluri catre gym-service
resilience4j:
  circuitbreaker:
    instances:
      gym-service:
        registerHealthIndicator: true
        slidingWindowSize: 5
        minimumNumberOfCalls: 3
        permittedNumberOfCallsInHalfOpenState: 2
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        ignoreExceptions:
          - feign.FeignException$NotFound
  retry:
    instances:
      gym-service:
        maxAttempts: 3
        waitDuration: 500ms
