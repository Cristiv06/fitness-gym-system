version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: gym-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: gym_system
      MYSQL_USER: gym_user
      MYSQL_PASSWORD: gym_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot_pass"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
