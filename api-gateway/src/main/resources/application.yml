server:
  port: 8080

spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:http://localhost:8888
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: user-service-auth
          uri: lb://user-service
          predicates:
            - Path=/login,/logout
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/members/**,/api/member-profiles/**,/api/membership-plans/**,/api/subscriptions/**,/api/auth/**
        - id: gym-service
          uri: lb://gym-service
          predicates:
            - Path=/api/trainers/**,/api/rooms/**,/api/equipment/**,/api/gym-classes/**,/api/class-enrollments/**,/api/check-ins/**
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/reports/**

# Custom rate limiting (in-memory, per client IP, fixed window) applied globally at the gateway
gateway:
  rate-limit:
    capacity: 30
    window-seconds: 10

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

logging:
  level:
    com.fitness: DEBUG
